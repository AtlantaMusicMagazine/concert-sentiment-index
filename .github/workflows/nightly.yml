name: Nightly Dashboard Refresh

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    name: Collect → Score → Build → Upload
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # 4. Restore YouTube view-count cache + rank history cache from previous run
      #    Key rotates by run_number so each run writes a fresh entry.
      #    restore-keys fallback finds the most recent prior cache automatically.
      - name: Restore YouTube cache
        id: yt-cache-restore
        uses: actions/cache@v4
        with:
          path: |
            data/youtube_cache.json
            data/rank_history.json
            data/amm_coverage.json
          key: pipeline-cache-${{ github.run_number }}
          restore-keys: |
            pipeline-cache-

      - name: Report cache status
        run: |
          if [ "${{ steps.yt-cache-restore.outputs.cache-hit }}" == "true" ]; then
            echo "[cache] Pipeline cache restored from previous run"
            python3 -c "import json; c=json.load(open('data/youtube_cache.json')); print(f'[cache] YouTube: {len(c)} events cached')" 2>/dev/null || true
            python3 -c "import json; c=json.load(open('data/rank_history.json')); print(f'[cache] Rank history: {len(c)} events cached')" 2>/dev/null || true
            # Delete stale AMM catalog cache so date_from_slug fix takes effect.
            # The prior cache stored lastmod dates (all "2025-02-xx") instead of
            # slug-derived dates. collect.py now detects this and re-fetches, but
            # deleting it here ensures a clean slate regardless of detection logic.
            if [ -f data/amm_coverage.json ]; then
              rm data/amm_coverage.json
              echo "[cache] Deleted stale amm_coverage.json — will re-fetch from sitemap"
            fi
          else
            echo "[cache] No prior cache found — first run or expired"
            mkdir -p data
            echo '{}' > data/youtube_cache.json
            echo '{}' > data/rank_history.json
          fi

      # 5. Run the full pipeline
      - name: Run nightly pipeline
        env:
          # ── Ticket demand ────────────────────────────────────────────────
          TICKETMASTER_KEY:    ${{ secrets.TICKETMASTER_KEY }}
          SEATGEEK_CLIENT_ID:  ${{ secrets.SEATGEEK_CLIENT_ID }}
          SEATGEEK_SECRET:     ${{ secrets.SEATGEEK_SECRET }}
          STUBHUB_TOKEN:       ${{ secrets.STUBHUB_TOKEN }}

          # ── Sentiment / streaming ────────────────────────────────────────
          SPOTIFY_CLIENT_ID:   ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_SECRET:      ${{ secrets.SPOTIFY_SECRET }}
          CHARTMETRIC_TOKEN:   ${{ secrets.CHARTMETRIC_TOKEN }}
          LASTFM_KEY:          ${{ secrets.LASTFM_KEY }}
          YOUTUBE_API_KEY:     ${{ secrets.YOUTUBE_API_KEY }}
          EVENTBRITE_TOKEN:    ${{ secrets.EVENTBRITE_TOKEN }}

          # ── Historical sales ─────────────────────────────────────────────
          SETLISTFM_KEY:       ${{ secrets.SETLISTFM_KEY }}

          # ── Local intent ─────────────────────────────────────────────────
          SERPAPI_KEY:         ${{ secrets.SERPAPI_KEY }}
          BANDSINTOWN_KEY:     ${{ secrets.BANDSINTOWN_KEY }}

          # ── Wikipedia (keyless) ──────────────────────────────────────────
          WIKIPEDIA_USER:      "atlanta-music-magazine/1.0 (contact@atlantamusicmagazine.com)"

          # ── WordPress upload ─────────────────────────────────────────────
          WP_SITE_URL:         ${{ secrets.WP_SITE_URL }}
          WP_USERNAME:         ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          WP_PAGE_ID:          ${{ secrets.WP_PAGE_ID }}
          WP_UPLOAD_MODE:      "page"
          CF_ZONE_ID:          ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN:        ${{ secrets.CF_API_TOKEN }}

        run: python pipeline.py

      # 6. Save updated YouTube cache for next run
      #    Runs even if the pipeline step fails so a partial cache
      #    is never lost. The cache@v4 action uses the key set in
      #    step 4 — same key = this run's cache overwrites last run's.
      - name: Save pipeline cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            data/youtube_cache.json
            data/rank_history.json
            data/amm_coverage.json
          key: pipeline-cache-${{ github.run_number }}

      # 7. Deploy dashboard to GitHub Pages
      #    The output HTML is copied to a gh-pages branch as index.html.
      #    This bypasses WordPress.com's CDN cache entirely — the page
      #    is served directly from GitHub's CDN with no intermediate cache.
      #    WordPress embeds it via iframe at the concert-sentiment-index URL.
      - name: Deploy to GitHub Pages
        run: |
          mkdir -p gh-pages-deploy
          cp output/artist_card_module_wp_ready.html gh-pages-deploy/index.html
          cd gh-pages-deploy
          git init
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -b gh-pages
          git add index.html
          git commit -m "Dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push --force origin gh-pages
          echo "[pages] Deployed to gh-pages branch"

      # 8. Upload dashboard HTML artifact
      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ github.run_id }}
          path: output/artist_card_module_wp_ready.html
          retention-days: 7

      # 9. Upload pipeline data artifacts for debugging
      - name: Upload data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data-${{ github.run_id }}
          path: data/
          retention-days: 3

